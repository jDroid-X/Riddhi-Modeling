<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceOnWeb Engine - Searching for Riddhi</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --accent: #C5A059;
            --card-bg: #1a1a1a;
            --text: #f5f5f5;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar / Reference Area */
        .sidebar {
            width: 300px;
            background: var(--card-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        .ref-image-container {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .ref-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-arrow {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .btn-arrow:hover {
            transform: scale(1.05);
            background: #d4ae6a;
        }

        /* Main Search Area */
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: relative;
        }

        .header {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--accent);
        }

        .results-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item {
            background: var(--card-bg);
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-info h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .result-info p {
            margin: 0.2rem 0 0;
            color: #888;
            font-size: 0.9rem;
        }

        .btn-download {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-download:hover {
            background: var(--accent);
            color: #000;
        }

        .status-msg {
            font-size: 0.9rem;
            color: #888;
            font-style: italic;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .next-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2 style="font-family: 'Playfair Display'; margin:0">REFERENCE</h2>
        <div class="ref-image-container">
            <!-- Relative path for local server reliability -->
            <img src="web_photo/Face.jpeg" alt="Reference Face">
        </div>

        <div class="search-controls">
            <button class="btn-arrow" onclick="startSearch()">
                FIND ON INTERNET ➔
            </button>
            <p class="status-msg" id="status">Ready to scan...</p>
        </div>
    </div>

    <div class="main-content">
        <h1 class="header">FaceOnWeb Intelligence</h1>

        <div id="loader" class="loader"></div>

        <div class="results-container" id="results">
            <div style="text-align:center; color:#555; margin-top:50px">
                <p>Click the arrow to begin the face matching process.</p>
            </div>
        </div>

        <div class="next-container">
            <button class="btn-download" id="btn-next" style="display:none;" onclick="findNext()">FIND NEXT ➔</button>
        </div>
    </div>

    <script>
        let searchIndex = 0;
        const mockResults = [
            { title: "Instagram: Riddhi - Fashion Week Highlights", url: "https://instagram.com/p/riddhi_model", site: "instagram.com" },
            { title: "Vogue: Top Emerging Models to Watch", url: "https://vogue.com/article/riddhi-feature", site: "vogue.com" },
            { title: "Snapchat: Riddhi - Behind the Scenes", url: "https://snapchat.com/add/riddhi_modeling", site: "snapchat.com" },
            { title: "Facebook: Riddhi Modeling Official Page", url: "https://facebook.com/riddhimodeling", site: "facebook.com" },
            { title: "Model Management: Riddhi Portfolio", url: "https://modelmanagement.com/model/riddhi", site: "modelmanagement.com" }
        ];

        function startSearch() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status').innerText = 'Scanning social platforms...';
            document.getElementById('results').innerHTML = '';

            // Simulating network delay
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status').innerText = 'Match found!';
                showResult(searchIndex);
                document.getElementById('btn-next').style.display = 'block';
            }, 2000);
        }

        function showResult(index) {
            const result = mockResults[index];
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div class="result-info">
                    <h3>${result.title}</h3>
                    <p>${result.url}</p>
                </div>
                <button class="btn-download" onclick="window.open('${result.url}', '_blank')">VIEW & SAVE</button>
            `;
            document.getElementById('results').appendChild(div);
        }

        function findNext() {
            searchIndex++;
            if (searchIndex >= mockResults.length) {
                document.getElementById('status').innerText = 'No more matches found.';
                document.getElementById('btn-next').style.display = 'none';
                return;
            }
            startSearch();
        }
    </script>
</body>

</html>
