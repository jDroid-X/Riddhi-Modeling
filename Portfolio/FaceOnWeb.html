<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceOnWeb Engine - Searching for Riddhi</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --accent: #C5A059;
            --card-bg: #1a1a1a;
            --text: #f5f5f5;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar / Reference Area */
        .sidebar {
            width: 300px;
            background: var(--card-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        .ref-image-container {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .ref-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Face Bounding Box */
        .face-box {
            position: absolute;
            border: 2px solid #00ff00;
            box-shadow: 0 0 10px #00ff00, inset 0 0 10px #00ff00;
            display: none;
            z-index: 5;
            pointer-events: none;
        }

        .face-box::before {
            content: 'FACE DETECTED';
            position: absolute;
            top: -25px;
            left: 0;
            background: #00ff00;
            color: #000;
            font-size: 0.6rem;
            padding: 2px 5px;
            font-weight: 800;
        }

        /* Scanning Line */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
            z-index: 6;
            display: none;
            animation: scanMove 2s linear infinite;
        }

        @keyframes scanMove {
            0% {
                top: 0;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 0;
            }
        }

        .search-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-scan {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            letter-spacing: 0.1rem;
        }

        .btn-scan:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        .btn-arrow {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .btn-arrow:hover {
            transform: scale(1.05);
            background: #d4ae6a;
        }

        /* Main Search Area */
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: relative;
        }

        .header {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--accent);
        }

        .results-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item {
            background: var(--card-bg);
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-info h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .result-info p {
            margin: 0.2rem 0 0;
            color: #888;
            font-size: 0.9rem;
        }

        .btn-download {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-download:hover {
            background: var(--accent);
            color: #000;
        }

        .status-msg {
            font-size: 0.9rem;
            color: #888;
            font-style: italic;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Scrolling Thumbnails */
        .scrolling-container {
            height: 120px;
            width: 100%;
            overflow: hidden;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 10px;
            position: relative;
            display: none;
        }

        .thumbnail-track {
            display: flex;
            gap: 10px;
            padding: 10px;
            animation: scrollThumbs 10s linear infinite;
            width: max-content;
        }

        .thumb {
            width: 80px;
            height: 100px;
            background: #222;
            border: 1px solid #444;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(2px) grayscale(1);
            transition: 0.3s;
        }

        .thumb.active img {
            filter: none;
            border: 2px solid #00ff00;
        }

        @keyframes scrollThumbs {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .next-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2 style="font-family: 'Playfair Display'; margin:0">REFERENCE</h2>
        <div class="ref-image-container" id="refContainer">
            <div id="faceBox" class="face-box"></div>
            <div id="scanLine" class="scan-line"></div>
            <!-- Relative path for local server reliability -->
            <img src="web_photo/Face.jpeg" alt="Reference Face">
        </div>

        <div class="search-controls">
            <button class="btn-scan" id="btnScan" onclick="performScan()">
                SCAN FACE 🔍
            </button>
            <button class="btn-arrow" id="btnFind" style="opacity:0.5; pointer-events:none;" onclick="startSearch()">
                FIND ON INTERNET ➔
            </button>
            <p class="status-msg" id="status">Ready to scan...</p>
        </div>
    </div>

    <div class="main-content">
        <h1 class="header">FaceOnWeb Intelligence</h1>

        <div class="scrolling-container" id="scrollContainer">
            <div class="thumbnail-track" id="thumbTrack">
                <!-- Generating thumbnails dynamically -->
            </div>
        </div>

        <div id="loader" class="loader"></div>

        <div class="results-container" id="results">
            <div style="text-align:center; color:#555; margin-top:50px">
                <p>Initialize the scan to focus on the face and start the search.</p>
            </div>
        </div>

        <div class="next-container">
            <button class="btn-download" id="btn-next" style="display:none;" onclick="findNext()">FIND NEXT ➔</button>
        </div>
    </div>

    <script>
        let searchIndex = 0;
        const mockResults = [
            { title: "Talentrack: Riddhi Mudgal Portfolio (Finalist Miss Diva)", url: "https://www.talentrack.in/model-actor-in-jaipur/riddhi-mudgal", site: "talentrack.in", score: "98.4%" },
            { title: "Wikipedia: Riddhi Kumar (Fashion & Film Actress)", url: "https://en.wikipedia.org/wiki/Riddhi_Kumar", site: "wikipedia.org", score: "96.2%" },
            { title: "Snapchat: Riddhi - BTS Modeling", url: "https://snapchat.com", site: "snapchat.com", score: "94.8%" },
            { title: "Pinterest: Riddhi Modeling Aesthetic Gallery", url: "https://www.pinterest.com/search/pics/?q=Riddhi%20Modeling", site: "pinterest.com", score: "92.1%" },
            { title: "Social: Riddhi Fashion Profile", url: "https://instagram.com", site: "social.com", score: "90.5%" }
        ];

        // Populate thumbnail track
        const track = document.getElementById('thumbTrack');
        const images = [
            'assets/images/img1.jpeg', 'assets/images/Img2.jpeg', 'assets/images/Img3.jpeg',
            'assets/images/Img4.jpeg', 'assets/images/Img5.jpeg', 'assets/images/Img6.jpeg',
            'assets/images/Img7.jpeg', 'assets/images/Img8.jpeg', 'assets/images/Img9.jpeg'
        ];

        // Triple the images for seamless loop
        [...images, ...images, ...images].forEach(src => {
            const div = document.createElement('div');
            div.className = 'thumb';
            div.innerHTML = `<img src="${src}">`;
            track.appendChild(div);
        });

        function performScan() {
            const faceBox = document.getElementById('faceBox');
            const scanLine = document.getElementById('scanLine');
            const status = document.getElementById('status');
            const btnFind = document.getElementById('btnFind');

            status.innerText = 'Detecting face features...';
            scanLine.style.display = 'block';

            // Simulating Bounding Box focus
            setTimeout(() => {
                faceBox.style.top = '20%';
                faceBox.style.left = '25%';
                faceBox.style.width = '50%';
                faceBox.style.height = '50%';
                faceBox.style.display = 'block';
                status.innerText = 'Face mapped. Ready for Search.';

                btnFind.style.opacity = '1';
                btnFind.style.pointerEvents = 'auto';

                // Keep scan line for visual effect
                scanLine.style.animation = 'scanMove 1s linear infinite';
            }, 1500);
        }

        function startSearch() {
            const scrollContainer = document.getElementById('scrollContainer');
            const resultsBox = document.getElementById('results');
            const status = document.getElementById('status');

            scrollContainer.style.display = 'block';
            resultsBox.innerHTML = '<p style="text-align:center; color:#00ff00; font-size:0.8rem">CROSS-REFERENCING OPEN SOURCE LIBRARIES...</p>';
            status.innerText = 'Reading image data from internet...';

            // Highlighting thumbnails simulation
            const thumbs = document.querySelectorAll('.thumb');
            let t = 0;
            const highlightInterval = setInterval(() => {
                thumbs.forEach(el => el.classList.remove('active'));
                thumbs[t % thumbs.length].classList.add('active');
                t++;
            }, 100);

            setTimeout(() => {
                clearInterval(highlightInterval);
                scrollContainer.style.display = 'none';
                status.innerText = 'Neural Match Complete.';
                showResult(searchIndex);
                document.getElementById('btn-next').style.display = 'block';
            }, 3000);
        }

        function showResult(index) {
            const result = mockResults[index];
            const div = document.createElement('div');
            div.className = 'result-item';
            div.style.background = 'rgba(0, 255, 0, 0.05)';
            div.innerHTML = `
                <div class="result-info">
                    <h3 style="color:#00ff00">${result.title}</h3>
                    <p>${result.url}</p>
                    <span style="font-size:0.75rem; color:#00ff00; font-weight:800">MATCH: ${result.score} (Open Lib ID: RF-${Math.floor(Math.random() * 1000)})</span>
                </div>
                <button class="btn-download" style="border-color:#00ff00; color:#00ff00" onclick="window.open('${result.url}', '_blank')">OPEN MATCH</button>
            `;
            document.getElementById('results').prepend(div);
        }

        function findNext() {
            searchIndex++;
            if (searchIndex >= mockResults.length) {
                const resultsBox = document.getElementById('results');
                const div = document.createElement('div');
                div.style.padding = "20px";
                div.style.textAlign = "center";
                div.innerHTML = `
                    <p style="color:#ff4444">END OF PRIMARY DATABASE.</p>
                    <button class="btn-arrow" style="font-size:0.9rem" onclick="window.open('https://www.google.com/searchbyimage?image_url=https://jdroid-x.github.io/Riddhi-Modeling/Portfolio/web_photo/Face.jpeg', '_blank')">
                        INITIATE DEEP NEURAL SCAN ➔
                    </button>
                `;
                resultsBox.prepend(div);
                document.getElementById('status').innerText = 'Database exhausted.';
                document.getElementById('btn-next').style.display = 'none';
                return;
            }
            startSearch();
        }
    </script>
</body>

</html>
